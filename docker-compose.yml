version: "3.9"

services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      - mongo
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGO_URI: mongodb://mongo:27017/portfolio
      FRONTEND_URL: http://localhost:8080
      JWT_SECRET: ${JWT_SECRET:-change_me_access}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change_me_refresh}
      OTP_PEPPER: ${OTP_PEPPER:-change_me_pepper}
      COOKIE_SECURE: "false"
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      EMAIL_FROM: ${EMAIL_FROM:-Portfolio <no-reply@yourapp.com>}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    volumes:
      - uploads:/app/uploads
    ports:
      - "5000:5000"

  frontend:
    build:
      context: ./frontend
      args:
        # built against the nginx /api proxy, so leave as root
        VITE_API_URL: ""
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  mongo_data:
  uploads:
